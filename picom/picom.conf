#################################
# Básico
#################################
backend = "glx";
vsync = true;

#################################
# Transparência
#################################
inactive-opacity = 0.90;   # Janelas em segundo plano ficam 90% opacas
active-opacity   = 1.0;    # Janela ativa 100% opaca
frame-opacity    = 0.9;    # Bordas das janelas
inactive-opacity-override = false;

#################################
# Sombras
#################################
shadow = true;
shadow-radius = 12;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.5;

#################################
# Filtros
#################################
blur-background-exclude = [
  "class_g = 'slop'",        # maim selection tool
  "class_g = 'maim'",        # sometimes appears depending on build
  "class_g = 'flameshot'",   # if you ever use flameshot
  "name = 'screenshot'",     # generic fallback
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

#################################
# Correções
#################################
detect-rounded-corners = true;
detect-client-opacity = true;
